<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Demo</title>
<style>
  @font-face {
    font-family: 'Libre Baskerville'; font-style: normal; font-weight: 400; font-display: swap;
    src: url('fonts/libre-baskerville-400.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Libre Baskerville'; font-style: italic; font-weight: 400; font-display: swap;
    src: url('fonts/libre-baskerville-400-italic.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Libre Baskerville'; font-style: normal; font-weight: 700; font-display: swap;
    src: url('fonts/libre-baskerville-700.woff2') format('woff2');
  }

  :root {
    --bg: #ffffff;
    --bg-soft: #f4f4f5;
    --ink: #000000;
    --muted: #5f5f63;
    --light: #8f8f94;
    --border: #dfdfe2;
    --accent: #000000;
    --accent-soft: rgba(0, 0, 0, 0.08);
    --danger: #d70015;
    --shadow: rgba(0, 0, 0, 0.08);
    --shadow-lg: rgba(0, 0, 0, 0.12);
    --display: 'Libre Baskerville', Georgia, serif;
    --body: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: var(--body);
    background: var(--bg-soft);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 1.5rem;
    position: relative; overflow: hidden;
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 0;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.9), rgba(244,244,245,0.94));
    pointer-events: none;
  }

  .lock-card {
    position: relative; z-index: 1;
    width: 100%; max-width: 390px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 28px;
    box-shadow: 0 24px 60px -38px var(--shadow-lg);
    padding: clamp(1.8rem, 5vw, 2.7rem) clamp(1.5rem, 5vw, 2.4rem);
    text-align: center;
    animation: rise 0.7s var(--ease) both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: none; } }

  .lock-card h1 {
    font-family: var(--body); font-weight: 700;
    font-size: clamp(1.25rem, 5vw, 1.65rem); letter-spacing: 0;
    line-height: 1.15; color: var(--ink);
  }
  .pin-row { display: flex; gap: 0.55rem; justify-content: center; margin: 1.65rem 0 0.4rem; }
  .pin-box {
    width: 48px; height: 58px;
    border: 1px solid var(--border); border-radius: 16px;
    background: var(--bg-soft);
    font-family: var(--body); font-size: 1.5rem; font-weight: 600; text-align: center;
    color: var(--ink); caret-color: var(--accent);
    transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease), background 0.2s var(--ease);
    -webkit-text-security: disc; /* mask digits like a real PIN field */
  }
  .pin-box:focus {
    outline: none; border-color: var(--accent);
    background: var(--bg);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  @media (max-width: 380px) { .pin-box { width: 42px; height: 52px; font-size: 1.3rem; } .pin-row { gap: 0.4rem; } }

  .pin-row.shake { animation: shake 0.45s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-5px);} 80%{transform:translateX(5px);} }

  .err {
    min-height: 1.2rem; color: var(--danger);
    font-size: 0.86rem; font-weight: 500; margin-top: 0.5rem;
    opacity: 0; transition: opacity 0.2s ease;
  }
  .err.show { opacity: 1; }

  .unlock {
    width: 100%; margin-top: 1.2rem;
    border: none; border-radius: 980px;
    background: var(--accent); color: #fff;
    font-family: var(--body); font-size: 1rem; font-weight: 600;
    padding: 0.95rem 1.5rem; cursor: pointer;
    transition: filter 0.2s var(--ease), transform 0.2s var(--ease), opacity 0.2s;
  }
  .unlock:hover { filter: brightness(1.06); transform: translateY(-1px); }
  .unlock:active { transform: translateY(0); }
  .unlock:disabled { opacity: 0.55; cursor: default; transform: none; filter: none; }

  .noscript { color: var(--danger); font-size: 0.9rem; margin-top: 1rem; }
</style>
</head>
<body>
  <main class="lock-card" role="dialog" aria-labelledby="lockTitle">
    <h1 id="lockTitle">Enter PIN to Access</h1>

    <div class="pin-row" id="pinRow">
      <input class="pin-box" type="text" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="PIN digit 1" />
      <input class="pin-box" type="text" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="PIN digit 2" />
      <input class="pin-box" type="text" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="PIN digit 3" />
      <input class="pin-box" type="text" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="PIN digit 4" />
      <input class="pin-box" type="text" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="PIN digit 5" />
      <input class="pin-box" type="text" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="PIN digit 6" />
    </div>
    <p class="err" id="err" role="alert"></p>

    <button class="unlock" id="unlock" type="button">Unlock</button>

    <noscript><p class="noscript">JavaScript is required to unlock this page.</p></noscript>
  </main>

  <script>
  (function () {
    'use strict';
    var blob = JSON.parse(document.getElementById('blob').textContent);
    var inputs = Array.prototype.slice.call(document.querySelectorAll('.pin-box'));
    var errEl = document.getElementById('err');
    var btn = document.getElementById('unlock');
    var row = document.getElementById('pinRow');
    var attempts = 0;
    var locked = false;

    function b64ToBytes(b64) {
      var bin = atob(b64), len = bin.length, bytes = new Uint8Array(len);
      for (var i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }
    function getPin() { return inputs.map(function (i) { return i.value; }).join(''); }
    function clearPin() { inputs.forEach(function (i) { i.value = ''; }); inputs[0].focus(); }
    function showErr(msg) {
      errEl.textContent = msg; errEl.classList.add('show');
      row.classList.add('shake'); setTimeout(function () { row.classList.remove('shake'); }, 450);
    }
    function clearErr() { errEl.textContent = ''; errEl.classList.remove('show'); }
    function setBusy(b) { btn.disabled = b; btn.textContent = b ? 'Unlocking…' : 'Unlock'; }

    function deriveKey(pin) {
      var enc = new TextEncoder();
      return crypto.subtle.importKey('raw', enc.encode(pin), { name: 'PBKDF2' }, false, ['deriveKey'])
        .then(function (km) {
          return crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: b64ToBytes(blob.salt), iterations: blob.iter, hash: 'SHA-256' },
            km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
          );
        });
    }

    function enhanceDeck(html) {

      var style = [
        '<style id="demo-runtime-style">',

        '.demo-corner-nav{position:fixed;right:18px;top:18px;z-index:2147483647;display:flex;gap:8px;align-items:center;}',
        '.demo-corner-nav__button{width:42px;height:42px;border-radius:999px;border:1px solid rgba(0,0,0,.12);background:rgba(255,255,255,.86);color:#000;box-shadow:0 14px 34px -24px rgba(0,0,0,.44);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:grid;place-items:center;font:700 12px/1 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;text-decoration:none;cursor:pointer;}',
        '.demo-corner-nav__button:hover,.demo-corner-nav__button:focus-visible{background:#000;color:#fff;outline:none;}',
        '.demo-impact-note{margin:1rem 0;padding:1rem 1.05rem;border:1px solid var(--demo-border);border-radius:8px;background:#fff;color:#000;box-shadow:0 16px 45px -34px rgba(0,0,0,.35);font:500 0.98rem/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;}',
        '.demo-impact-note strong{font-weight:800;}',
        '@media (max-width:820px){.overview-shell .cards{grid-template-columns:1fr!important}.overview-shell{padding:1rem;border-radius:24px}}',
        '@media (max-width:640px){.demo-corner-nav{right:12px;top:12px}.demo-corner-nav__button{width:38px;height:38px}}',
        '</style>'
      ].join('');

      var preScript = [
        '<script id="demo-pre-runtime-script">',
        '(function(){',
        'function text(el){return (el.textContent||"").replace(/\\s+/g," ").trim();}',
        'function htmlCard(idx,title,body,tags){return "<div class=\\"card\\" data-reveal=\\""+idx+"\\"><div class=\\"idx\\">0"+idx+"</div><h3>"+title+"</h3><p>"+body+"</p><div class=\\"tags\\">"+tags.map(function(t){return "<span class=\\"tag\\">"+t+"</span>";}).join("")+"</div></div>";}',
        'function findOverview(){return Array.prototype.slice.call(document.querySelectorAll(".slide")).find(function(slide){return /What I.ll walk through/i.test(text(slide));});}',
        'function fixCover(){var cover=document.querySelector(".cover .lede"); if(cover)cover.textContent="Three projects, three lenses: a complex B2B platform, an enterprise sustainability product, and the first product from my own company. Prepared for our conversation.";}',
        'function fixOverview(){var slide=findOverview(); if(!slide)return; var kicker=slide.querySelector(".kicker"); var cards=slide.querySelector(".cards"); if(!cards)return; if(!cards.querySelector("h3")||!/WizPOS/i.test(text(cards))){cards.insertAdjacentHTML("beforeend",htmlCard(3,"WizPOS","The first product from WizLabs, started from the earliest company product work in 2021 and now growing into an AI-first POS ecosystem.",["Founder-led","AI-first POS","2021 onwards"]));} if(!slide.querySelector(".overview-shell")){var shell=document.createElement("div"); shell.className="overview-shell"; shell.setAttribute("data-reveal","1"); if(kicker)shell.appendChild(kicker); shell.appendChild(cards); slide.appendChild(shell);} Array.prototype.slice.call(cards.children).forEach(function(card,idx){card.setAttribute("data-reveal",String(Math.min(idx+2,4)));});}',
        'function wizSlide(cls,inner){var section=document.createElement("section"); section.className="slide"+(cls?" "+cls:""); section.innerHTML=inner; return section;}',
        'function addWizPOS(){if(Array.prototype.slice.call(document.querySelectorAll(".slide")).some(function(slide){return /^03\\s+WizPOS/i.test(text(slide));}))return; var closing=document.querySelector(".slide.closing"); if(!closing)return; var slides=[',
        'wizSlide("divider","<div data-reveal=\\"1\\" class=\\"bignum\\">03</div><div data-reveal=\\"2\\" class=\\"title\\">WizPOS</div><div data-reveal=\\"3\\" class=\\"meta\\">WizLabs · Founder-led product · 2021 onwards</div>"),',
        'wizSlide("","<div class=\\"split\\"><div><span data-reveal=\\"1\\" class=\\"kicker\\">Objective</span><h2 data-reveal=\\"2\\" class=\\"display sm\\">Build the first product from my own company into an AI-first POS ecosystem.</h2><p data-reveal=\\"3\\" class=\\"support\\">WizPOS started as one of the earliest product ideas in the company journey, going back to 2021, and now anchors the broader WizLabs product direction.</p></div><div class=\\"media\\" data-reveal=\\"4\\"><img src=\\"images/Projects/WIZPos/WizPOS-feature.webp\\" alt=\\"WizPOS product interface\\"><div class=\\"media-ph\\" style=\\"display:flex\\"><span>WizPOS product interface<br><b>AI-first POS ecosystem</b></span></div></div></div>"),',
        'wizSlide("","<div class=\\"split\\"><div><span data-reveal=\\"1\\" class=\\"kicker\\">Background</span><h2 data-reveal=\\"2\\" class=\\"display sm\\">Retail work is fast, local, messy, and unforgiving.</h2><p data-reveal=\\"3\\" class=\\"support\\">The product is shaped around real operators in supermarkets, restaurants, pharmacies, cafes, schools, and entertainment venues: fast checkout, local resilience, simple setup, and workflows that can adapt by market.</p></div><div class=\\"media\\" data-reveal=\\"4\\"><img src=\\"images/Projects/WIZPos/case-study/live-keells-action.webp\\" alt=\\"WizPOS live action screen\\"><div class=\\"media-ph\\" style=\\"display:flex\\"><span>WizPOS field context<br><b>checkout and operator workflows</b></span></div></div></div>"),',
        'wizSlide("","<span data-reveal=\\"1\\" class=\\"kicker\\">Outcomes</span><h2 data-reveal=\\"2\\" class=\\"display sm\\">A company-defining product platform, not a one-off POS screen.</h2><div class=\\"metrics\\"><div class=\\"metric\\" data-reveal=\\"2\\"><div class=\\"big\\"><em>2021</em></div><div class=\\"lbl\\">one of the earliest product tracks that shaped the company direction</div></div><div class=\\"metric\\" data-reveal=\\"3\\"><div class=\\"big\\">Offline-first</div><div class=\\"lbl\\">local speed, encrypted local storage, and cloud-ready backup patterns</div></div><div class=\\"metric\\" data-reveal=\\"4\\"><div class=\\"big\\">AI-first</div><div class=\\"lbl\\">designed as a configurable ecosystem rather than a fixed single-market tool</div></div></div>")',
        ']; slides.forEach(function(slide){closing.parentNode.insertBefore(slide,closing);}); var closingTitle=closing.querySelector(".display"); if(closingTitle)closingTitle.innerHTML="Happy to go deeper on <em>any</em> one."; }',
        'fixCover();fixOverview();addWizPOS();',
        '})();',
        '<\\/script>'
      ].join('');

      var script = [
        '<script id="demo-runtime-script">',
        '(function(){',
        'function ready(fn){if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",fn,{once:true});}else{fn();}}',
        'function unique(list){var out=[];list.forEach(function(item){if(item&&out.indexOf(item)===-1)out.push(item);});return out;}',
        'function text(el){return (el.textContent||"").replace(/\\s+/g," ").trim();}',
        'function targetBlocks(){return unique(Array.prototype.slice.call(document.querySelectorAll("[data-slide],.slide,section,article")).filter(function(el){return text(el).length>0;}));}',
        'function jumpTo(el){if(!el)return; if(el.classList&&el.classList.contains("slide")&&typeof window.go==="function"){var idx=Array.prototype.indexOf.call(document.querySelectorAll(".slide"),el); if(idx>=0){window.go(idx); return;}} if(!el.id)el.id="demo-target-"+Math.random().toString(36).slice(2); history.replaceState(null,"","#"+el.id); el.scrollIntoView({behavior:"smooth",block:"start",inline:"start"});}',
        'function neutralizeBlue(){function swap(value){return value.replace(/#007aff/ig,"#000").replace(/#0a84ff/ig,"#000").replace(/rgb\\(\\s*0\\s*,\\s*122\\s*,\\s*255\\s*\\)/ig,"#000").replace(/rgba\\(\\s*0\\s*,\\s*122\\s*,\\s*255\\s*,\\s*[\\d.]+\\s*\\)/ig,"rgba(0,0,0,.08)");} document.querySelectorAll("style").forEach(function(el){var next=swap(el.textContent||""); if(next!==el.textContent)el.textContent=next;}); document.querySelectorAll("[style]").forEach(function(el){var next=swap(el.getAttribute("style")||""); if(next!==el.getAttribute("style"))el.setAttribute("style",next);});}',
        'function projectSlide(name){var heads=Array.prototype.slice.call(document.querySelectorAll(".slide .title,h1,h2,h3")); var head=heads.find(function(el){return new RegExp("^"+name+"$","i").test(text(el));}); return head?head.closest(".slide"):null;}',
        'function addNav(){if(document.querySelector(".demo-corner-nav"))return; var nav=document.createElement("nav"); nav.className="demo-corner-nav"; nav.setAttribute("aria-label","Slideshow shortcuts");',
        'var start=document.createElement("button"); start.className="demo-corner-nav__button"; start.type="button"; start.textContent="1"; start.title="Start of slideshow"; start.setAttribute("aria-label","Start of slideshow"); start.addEventListener("click",function(){jumpTo(targetBlocks()[0]||document.body);});',
        'var second=document.createElement("button"); second.className="demo-corner-nav__button"; second.type="button"; second.textContent="2"; second.title="Second project"; second.setAttribute("aria-label","Skip to second project"); second.addEventListener("click",function(){jumpTo(projectSlide("IFSZero")||targetBlocks()[8]||document.body);});',
        'var third=document.createElement("button"); third.className="demo-corner-nav__button"; third.type="button"; third.textContent="3"; third.title="Third project"; third.setAttribute("aria-label","Skip to third project"); third.addEventListener("click",function(){jumpTo(projectSlide("WizPOS")||targetBlocks()[14]||document.body);});',
        'var home=document.createElement("a"); home.className="demo-corner-nav__button"; home.href="https://asith.cc/"; home.textContent="H"; home.title="asith.cc home"; home.setAttribute("aria-label","Open asith.cc home"); nav.appendChild(start); nav.appendChild(second); nav.appendChild(third); nav.appendChild(home); document.body.appendChild(nav);}',
        'function addMarketplaceEffect(){var heads=Array.prototype.slice.call(document.querySelectorAll("h1,h2,h3,h4")); var head=heads.find(function(el){return /marketplace/i.test(text(el));}); if(!head||document.querySelector(".demo-impact-note"))return; var note=document.createElement("div"); note.className="demo-impact-note"; note.innerHTML="<strong>Effect:</strong> Before Marketplace, Ideamart products did not have a uniform design system. Teams and developers picked whichever premade UI library solved the immediate requirement, so the product suite felt mixed and inconsistent. During the Marketplace redesign, I built Polariz UI: a simple semantic CSS design system with BEM naming, inherited from Bootstrap 5.1, not locked behind npm, and easy for other teams to copy, customize, and use outside the department."; head.insertAdjacentElement("afterend",note);}',
        'ready(function(){neutralizeBlue();addNav();addMarketplaceEffect(); if(window.MutationObserver){new MutationObserver(function(){neutralizeBlue();}).observe(document.documentElement,{subtree:true,childList:true,attributes:true,attributeFilter:["style"]});}});',
        '})();',
        '<\\/script>'
      ].join('');

      var payload = style + script;
      var controller = /<script>\s*const slides = Array\.from\(document\.querySelectorAll\('\.slide'\)\);/;
      if (controller.test(html)) html = html.replace(controller, preScript + '<script>\n  const slides = Array.from(document.querySelectorAll(\'.slide\'));');
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, payload + '</body>');
      return html + preScript + payload;
    }

    function attempt() {
      if (locked) return;
      var pin = getPin();
      if (!/^[0-9]{6}$/.test(pin)) { showErr('Enter all 6 digits.'); return; }
      clearErr(); setBusy(true);
      deriveKey(pin)
        .then(function (key) {
          return crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBytes(blob.iv) }, key, b64ToBytes(blob.data));
        })
        .then(function (plain) {
          var html = enhanceDeck(new TextDecoder().decode(plain));
          // Correct PIN: swap the entire document for the decrypted deck.
          document.open(); document.write(html); document.close();
        })
        .catch(function () {
          // Wrong PIN -> AES-GCM auth tag fails -> nothing is ever revealed.
          setBusy(false); attempts++; clearPin();
          if (attempts >= 5) lockOut(); else showErr('Incorrect PIN. Try again.');
        });
    }

    function lockOut() {
      locked = true;
      var secs = 15;
      (function tick() {
        if (secs <= 0) { locked = false; clearErr(); setBusy(false); inputs[0].focus(); return; }
        showErr('Too many attempts. Wait ' + secs + 's.');
        secs--; setTimeout(tick, 1000);
      })();
    }

    inputs.forEach(function (input, idx) {
      input.addEventListener('input', function (e) {
        var v = e.target.value.replace(/[^0-9]/g, '');
        e.target.value = v.slice(-1);
        if (e.target.value && idx < inputs.length - 1) inputs[idx + 1].focus();
        if (idx === inputs.length - 1 && e.target.value && getPin().length === 6) attempt();
      });
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Backspace' && !input.value && idx > 0) inputs[idx - 1].focus();
        if (e.key === 'Enter') attempt();
      });
      input.addEventListener('paste', function (e) {
        e.preventDefault();
        var data = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, 6);
        data.split('').forEach(function (c, k) { if (inputs[k]) inputs[k].value = c; });
        if (data.length === 6) attempt();
        else if (inputs[data.length]) inputs[data.length].focus();
      });
    });

    btn.addEventListener('click', attempt);
    if (!(crypto && crypto.subtle)) showErr('This browser cannot unlock the page (no Web Crypto).');
    inputs[0].focus();
  })();
  </script>
