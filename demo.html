<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Keep this page out of search engines and archives. Not linked from anywhere. -->
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />

<title>Asith's Demo</title>
<style>
  @font-face {
    font-family: 'Libre Baskerville'; font-style: normal; font-weight: 400; font-display: swap;
    src: url('fonts/libre-baskerville-400.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Libre Baskerville'; font-style: italic; font-weight: 400; font-display: swap;
    src: url('fonts/libre-baskerville-400-italic.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Libre Baskerville'; font-style: normal; font-weight: 700; font-display: swap;
    src: url('fonts/libre-baskerville-700.woff2') format('woff2');
  }

  :root {
    --bg: #ffffff;
    --bg-soft: #f4f4f5;
    --ink: #000000;
    --muted: #5f5f63;
    --light: #8f8f94;
    --border: #dfdfe2;
    --accent: #000000;
    --accent-soft: rgba(0, 0, 0, 0.08);
    --danger: #d70015;
    --shadow: rgba(0, 0, 0, 0.08);
    --shadow-lg: rgba(0, 0, 0, 0.12);
    --display: 'Libre Baskerville', Georgia, serif;
    --body: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: var(--body);
    background: var(--bg-soft);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 1.5rem;
    position: relative; overflow: hidden;
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(244,244,245,0.94));
    pointer-events: none;
  }

  .lock-card {
    position: relative; z-index: 1;
    width: 100%; max-width: 390px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 28px;
    box-shadow: none;
    padding: clamp(1.8rem, 5vw, 2.7rem) clamp(1.5rem, 5vw, 2.4rem);
    text-align: center;
    animation: rise 0.7s var(--ease) both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: none; } }

  .lock-card h1 {
    font-family: var(--body); font-weight: 700;
    font-size: clamp(1.25rem, 5vw, 1.65rem); letter-spacing: 0;
    line-height: 1.15; color: var(--ink);
  }

  .pin-row { display: flex; gap: 0.55rem; justify-content: center; margin: 1.65rem 0 0.4rem; }
  .pin-box {
    width: 48px; height: 58px;
    border: 1px solid var(--border); border-radius: 16px;
    background: var(--bg-soft);
    font-family: var(--body); font-size: 1.5rem; font-weight: 600; text-align: center;
    color: var(--ink); caret-color: var(--accent);
    transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease), background 0.2s var(--ease);
    -webkit-text-security: disc; /* mask digits like a real PIN field */
  }
  .pin-box:focus {
    outline: none; border-color: var(--accent);
    background: var(--bg);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  @media (max-width: 380px) { .pin-box { width: 42px; height: 52px; font-size: 1.3rem; } .pin-row { gap: 0.4rem; } }

  .pin-row.shake { animation: shake 0.45s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-5px);} 80%{transform:translateX(5px);} }

  .err {
    min-height: 1.2rem; color: var(--danger);
    font-size: 0.86rem; font-weight: 500; margin-top: 0.5rem;
    opacity: 0; transition: opacity 0.2s ease;
  }
  .err.show { opacity: 1; }

  .unlock {
    width: 100%; margin-top: 1.2rem;
    border: none; border-radius: 980px;
    background: var(--accent); color: #fff;
    font-family: var(--body); font-size: 1rem; font-weight: 600;
    padding: 0.95rem 1.5rem; cursor: pointer;
    transition: filter 0.2s var(--ease), transform 0.2s var(--ease), opacity 0.2s;
  }
  .unlock:hover { filter: brightness(1.06); transform: translateY(-1px); }
  .unlock:active { transform: translateY(0); }
  .unlock:disabled { opacity: 0.55; cursor: default; transform: none; filter: none; }

  .noscript { color: var(--danger); font-size: 0.9rem; margin-top: 1rem; }
</style>
</head>
<body>
  <main class="lock-card" role="dialog" aria-labelledby="lockTitle">
    <h1 id="lockTitle">Enter PIN to Access</h1>

    <div class="pin-row" id="pinRow">
      <input class="pin-box" type="text" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="PIN digit 1" />
      <input class="pin-box" type="text" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="PIN digit 2" />
      <input class="pin-box" type="text" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="PIN digit 3" />
      <input class="pin-box" type="text" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="PIN digit 4" />
      <input class="pin-box" type="text" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="PIN digit 5" />
      <input class="pin-box" type="text" inputmode="numeric" autocomplete="off" maxlength="1" aria-label="PIN digit 6" />
    </div>
    <p class="err" id="err" role="alert"></p>

    <button class="unlock" id="unlock" type="button">Unlock</button>

    <noscript><p class="noscript">JavaScript is required to unlock this page.</p></noscript>
  </main>

  <script>
  (function () {
    'use strict';
    var blob = JSON.parse(document.getElementById('blob').textContent);
    var inputs = Array.prototype.slice.call(document.querySelectorAll('.pin-box'));
    var errEl = document.getElementById('err');
    var btn = document.getElementById('unlock');
    var row = document.getElementById('pinRow');
    var attempts = 0;
    var locked = false;

    function b64ToBytes(b64) {
      var bin = atob(b64), len = bin.length, bytes = new Uint8Array(len);
      for (var i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }
    function getPin() { return inputs.map(function (i) { return i.value; }).join(''); }
    function clearPin() { inputs.forEach(function (i) { i.value = ''; }); inputs[0].focus(); }
    function showErr(msg) {
      errEl.textContent = msg; errEl.classList.add('show');
      row.classList.add('shake'); setTimeout(function () { row.classList.remove('shake'); }, 450);
    }
    function clearErr() { errEl.textContent = ''; errEl.classList.remove('show'); }
    function setBusy(b) { btn.disabled = b; btn.textContent = b ? 'Unlocking…' : 'Unlock'; }

    function deriveKey(pin) {
      var enc = new TextEncoder();
      return crypto.subtle.importKey('raw', enc.encode(pin), { name: 'PBKDF2' }, false, ['deriveKey'])
        .then(function (km) {
          return crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: b64ToBytes(blob.salt), iterations: blob.iter, hash: 'SHA-256' },
            km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
          );
        });
    }

    function attempt() {
      if (locked) return;
      var pin = getPin();
      if (!/^[0-9]{6}$/.test(pin)) { showErr('Enter all 6 digits.'); return; }
      clearErr(); setBusy(true);
      deriveKey(pin)
        .then(function (key) {
          return crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBytes(blob.iv) }, key, b64ToBytes(blob.data));
        })
        .then(function (plain) {
          var html = new TextDecoder().decode(plain);
          // Correct PIN: swap the entire document for the decrypted deck.
          document.open(); document.write(html); document.close();
        })
        .catch(function () {
          // Wrong PIN -> AES-GCM auth tag fails -> nothing is ever revealed.
          setBusy(false); attempts++; clearPin();
          if (attempts >= 5) lockOut(); else showErr('Incorrect PIN. Try again.');
        });
    }

    function lockOut() {
      locked = true;
      var secs = 15;
      (function tick() {
        if (secs <= 0) { locked = false; clearErr(); setBusy(false); inputs[0].focus(); return; }
        showErr('Too many attempts. Wait ' + secs + 's.');
        secs--; setTimeout(tick, 1000);
      })();
    }

    inputs.forEach(function (input, idx) {
      input.addEventListener('input', function (e) {
        var v = e.target.value.replace(/[^0-9]/g, '');
        e.target.value = v.slice(-1);
        if (e.target.value && idx < inputs.length - 1) inputs[idx + 1].focus();
        if (idx === inputs.length - 1 && e.target.value && getPin().length === 6) attempt();
      });
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Backspace' && !input.value && idx > 0) inputs[idx - 1].focus();
        if (e.key === 'Enter') attempt();
      });
      input.addEventListener('paste', function (e) {
        e.preventDefault();
        var data = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, 6);
        data.split('').forEach(function (c, k) { if (inputs[k]) inputs[k].value = c; });
        if (data.length === 6) attempt();
        else if (inputs[data.length]) inputs[data.length].focus();
      });
    });

    btn.addEventListener('click', attempt);
    if (!(crypto && crypto.subtle)) showErr('This browser cannot unlock the page (no Web Crypto).');
    inputs[0].focus();
  })();
  </script>
